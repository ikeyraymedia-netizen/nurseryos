name: Deploy Firestore rules

on:
  push:
    branches: [main]
    paths:
      - firestore.rules
      - firebase.json
      - .firebaserc
      - .github/workflows/deploy-firestore-rules.yml
  workflow_dispatch:

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deploy Firestore rules
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "Missing GitHub secret FIREBASE_TOKEN."
            echo "Run: npx firebase-tools login:ci"
            echo "Then add the token as a repo secret named FIREBASE_TOKEN."
            exit 1
          fi
          npx --yes firebase-tools@latest deploy \
            --only firestore:rules \
            --project gen-lang-client-0852672677 \
            --non-interactive
